name: skill-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run bundled tests
        run: python -m unittest discover -s tests
      - name: Validate examples
        run: |
          python scripts/validate_worldcup_artifacts.py --score-json examples/score_prediction_sample.json
          python scripts/validate_worldcup_artifacts.py --score-summary-csv examples/score_summary_sample.csv
          python scripts/validate_worldcup_artifacts.py --schedule-audit-json examples/schedule_audit_sample.json
